<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e63946" />
  <title>Ranket</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/components/table-ranking.css">
  <link rel="stylesheet" href="css/components/match-cards.css">
  <link rel="stylesheet" href="css/components/forms.css">
  <link rel="stylesheet" href="css/components/ui.css">
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/components/stats.css">
  <link rel="stylesheet" href="css/components/settings.css">
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-logo">
      <span class="logo-icon">🏓</span>
      <span class="logo-text">Ranket</span>
    </div>
  </header>

  <!-- CONTENU PRINCIPAL -->
  <!-- Les vues classiques (ranking, match, history, players)
       sont injectées dynamiquement dans app-main via leur view-*.js -->
  <main class="app-main" id="app-main"></main>

  <!-- ONGLET STATS — géré séparément car structure fixe avec Canvas -->
  <section id="tab-stats" class="tab-content hidden">
    <div class="stats-header">
      <div class="stats-selectors">
        <div class="selector-group">
          <label for="stats-player-a">Joueur A</label>
          <select id="stats-player-a"></select>
        </div>
        <div class="selector-group">
          <label for="stats-player-b">Joueur B (comparaison)</label>
          <select id="stats-player-b"></select>
        </div>
      </div>
    </div>
    <div id="stats-content">
      <p class="stats-placeholder">Sélectionne un joueur pour voir ses statistiques.</p>
    </div>
  </section>

  <!-- ONGLET SETTINGS -->
  <section id="tab-settings" class="tab-content hidden">
  </section>


  <!-- NAVIGATION BAS -->
  <nav class="app-nav">
    <button class="nav-btn active" data-view="ranking">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">CLASSEMENT</span>
    </button>
    <button class="nav-btn" data-view="match">
      <span class="nav-icon">⚔️</span>
      <span class="nav-label">MATCH</span>
    </button>
    <button class="nav-btn" data-view="history">
      <span class="nav-icon">📋</span>
      <span class="nav-label">HISTORIQUE</span>
    </button>
    <button class="nav-btn" data-view="stats">
      <span class="nav-icon">📊</span>
      <span class="nav-label">STATS</span>
    </button>
    <button class="nav-btn" data-view="players">
      <span class="nav-icon">👥</span>
      <span class="nav-label">JOUEURS</span>
    </button>
    <button class="nav-btn" data-view="settings">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">RÉGLAGES</span>
    </button>
  </nav>

  <!-- MODAL GÉNÉRIQUE -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- JS — ordre de chargement important -->
  <!-- Base -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/elo.js"></script>
  <!-- Logique métier -->
  <script src="js/players.js"></script>
  <script src="js/matches.js"></script>
  <script src="js/ranking.js"></script>
  <!-- Stats -->
  <script src="js/stats.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/views/view-stats.js"></script>
  <!-- UI & vues -->
  <script src="js/ui.js"></script>
  <script src="js/views/view-ranking.js"></script>
  <script src="js/views/view-match.html.js"></script>
  <script src="js/views/view-match.logic.js"></script>
  <script src="js/views/view-match.js"></script>
  <script src="js/views/view-history.js"></script>
  <script src="js/views/view-edit-match.js"></script>
  <script src="js/views/view-players.js"></script>
  <script src="js/import-export.js"></script>
  <script src="js/views/view-settings.html.js"></script>
  <script src="js/views/view-settings.js"></script>

  <!-- Point d'entrée — toujours en dernier -->
  <script src="js/app.js"></script>

</body>
</html>
