<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e63946" />
  <title>Ranket</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-logo">
      <span class="logo-icon">🏓</span>
      <span class="logo-text">Ranket</span>
    </div>
  </header>

  <!-- CONTENU PRINCIPAL -->
  <main class="app-main" id="app-main">
    <!-- Les vues sont injectées ici dynamiquement -->
  </main>

  <!-- NAVIGATION BAS -->
  <nav class="app-nav">
    <button class="nav-btn active" data-view="ranking">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">CLASSEMENT</span>
    </button>
    <button class="nav-btn" data-view="match">
      <span class="nav-icon">⚔️</span>
      <span class="nav-label">MATCH</span>
    </button>
    <button class="nav-btn" data-view="history">
      <span class="nav-icon">📋</span>
      <span class="nav-label">HISTORIQUE</span>
    </button>
    <button class="nav-btn" data-view="players">
      <span class="nav-icon">👥</span>
      <span class="nav-label">JOUEURS</span>
    </button>
  </nav>

  <!-- MODAL GÉNÉRIQUE -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast"></div>

  <!-- JS — ordre de chargement important -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/elo.js"></script>
  <script src="js/players.js"></script>
  <script src="js/matches.js"></script>
  <script src="js/ranking.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/views/view-ranking.js"></script>
  <script src="js/views/view-match.js"></script>
  <script src="js/views/view-history.js"></script>
  <script src="js/views/view-players.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
